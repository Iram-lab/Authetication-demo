<div class="dashboard-wrapper">
  <!-- Sidebar Navigation Panel -->
  <aside class="sidebar">
    <div class="logo-section">
      <span class="logo-icon">🔐</span>
      <h2>SecureApp</h2>
    </div>
    <nav class="nav-menu">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">📈 Overview</a>
      
      <!-- 🔄 Dynamic Side Links based on login state -->
      <ng-container *ngIf="!isUserLoggedIn()">
        <button (click)="navigateToAuth(true)" class="nav-link-btn text-left">🔑 Sign In</button>
        <button (click)="navigateToAuth(false)" class="nav-link-btn text-left">📝 Sign Up</button>
      </ng-container>
    </nav>
  </aside>

  <!-- Main View Presentation Content Window Area -->
  <main class="main-content">
    <header class="top-bar">
      <h1>Welcome back, <span class="highlight">{{ userName }}</span>!</h1>
      <button *ngIf="isUserLoggedIn()" (click)="onLogout()" class="logout-btn">🚪 Logout</button>
    </header>
    
    <div class="content-body">
      <div class="card">
        <h3>Security Overview</h3>
        <p>Your session profile state info data is securely verified end-to-end.</p>
      </div>

      <!-- 🌟 ADDED: Securely renders the active JWT Token string directly on screen -->
      <div class="card token-card" style="margin-top: 20px;">
        <h3>🔑 Active Session Token (JWT)</h3>
        <div class="token-container" style="background: #f4f6f9; padding: 15px; border-radius: 6px; word-break: break-all; font-family: monospace;">
          <code>{{ userToken }}</code>
        </div>
      </div>
    </div>
  </main>
</div>
